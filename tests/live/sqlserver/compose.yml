services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sloppy-sqlserver-live
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: "Sloppy_Strong_Passw0rd!"
    ports:
      - "51433:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"select 1\" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"select 1\""
        ]
      interval: 5s
      timeout: 5s
      retries: 30
