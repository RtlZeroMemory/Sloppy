services:
  postgres:
    image: postgres:16-alpine
    container_name: sloppy-live-postgres
    environment:
      POSTGRES_USER: sloppy
      POSTGRES_PASSWORD: sloppy
      POSTGRES_DB: sloppy_test
    ports:
      - "55432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sloppy -d sloppy_test"]
      interval: 2s
      timeout: 2s
      retries: 30
