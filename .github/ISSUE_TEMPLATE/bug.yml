name: Bug report
description: Report a defect or regression.
title: "Bug: "
labels: ["type:bug", "status:needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps, command, or small app that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Remove tokens, credentials, connection strings, and machine/private paths before pasting output.
  - type: input
    id: version
    attributes:
      label: Sloppy version
      placeholder: "sloppy --version"
  - type: input
    id: os
    attributes:
      label: OS and architecture
      placeholder: "Windows x64, Linux x64 glibc, ..."
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Remove tokens, credentials, connection strings, and machine/private paths before pasting output.
      render: text
  - type: textarea
    id: commands
    attributes:
      label: Commands run
      description: Remove tokens, credentials, connection strings, and machine/private paths before pasting commands.
      render: text
