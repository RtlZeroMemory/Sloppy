name: EPIC
description: Large outcome issue that groups bounded-context tasks.
title: "EPIC-XX: "
labels: ["type:epic", "status:ready"]
body:
  - type: textarea
    id: summary
    attributes: { label: Summary, description: What outcome does this EPIC deliver? }
    validations: { required: true }
  - type: textarea
    id: source-docs
    attributes: { label: Source docs, description: List source docs and ADRs that govern this EPIC. }
    validations: { required: true }
  - type: textarea
    id: goal
    attributes: { label: Goal }
    validations: { required: true }
  - type: textarea
    id: non-goals
    attributes: { label: Non-goals }
    validations: { required: true }
  - type: textarea
    id: scope
    attributes: { label: Scope }
    validations: { required: true }
  - type: textarea
    id: tasks
    attributes: { label: Tasks / child issues }
  - type: textarea
    id: files
    attributes: { label: Files likely touched }
  - type: textarea
    id: tests
    attributes: { label: Tests required }
  - type: textarea
    id: quality-gates
    attributes: { label: Quality gates }
  - type: textarea
    id: acceptance
    attributes: { label: Acceptance criteria }
    validations: { required: true }
  - type: textarea
    id: risks
    attributes: { label: Risks }
  - type: textarea
    id: deferred
    attributes: { label: Deferred decisions }
  - type: textarea
    id: reviewer-focus
    attributes: { label: Reviewer focus }
  - type: input
    id: milestone
    attributes: { label: Milestone }
  - type: input
    id: labels
    attributes: { label: Labels }