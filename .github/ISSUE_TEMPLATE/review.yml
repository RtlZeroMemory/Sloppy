name: Review
description: Review, verification, or project ceremony task.
title: "REVIEW: "
labels: ["type:review", "status:ready"]
body:
  - type: textarea
    id: target
    attributes: { label: Target, description: PR, branch, task, or docs being reviewed. }
    validations: { required: true }
  - type: textarea
    id: source-docs
    attributes: { label: Source docs }
  - type: textarea
    id: focus
    attributes: { label: Reviewer focus }
  - type: textarea
    id: output
    attributes: { label: Expected output }