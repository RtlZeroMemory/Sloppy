      - name: Build
        shell: bash
        run: cmake --build --preset "${{ matrix.preset }}"

      - name: Test
        shell: bash
        run: ctest --preset "${{ matrix.preset }}" --output-on-failure

  advanced-analysis:
    name: advanced static analysis
    runs-on: ubuntu-latest
    needs: changes
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.advanced_analysis == 'true') ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && (
        contains(github.event.pull_request.labels.*.name, 'full-ci') ||
        contains(github.event.pull_request.labels.*.name, 'memory-analysis')
      )) ||
      (github.event_name == 'push' && needs.changes.outputs.analysis_relevant == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install host dependencies
        shell: bash
        run: |
          set -euo pipefail
          packages=(build-essential clang clang-tidy cmake ninja-build pkg-config curl zip unzip tar autoconf autoconf-archive automake libtool bison flex ccache)
          missing=()

          for command in clang clang++ clang-tidy cmake ninja pkg-config curl zip unzip tar autoconf automake libtoolize bison flex ccache; do
            if ! command -v "$command" >/dev/null 2>&1; then
              missing=("${packages[@]}")
              break
            fi
          done
          if ! dpkg-query -W -f='${Status}' autoconf-archive 2>/dev/null | grep -q "install ok installed"; then
            missing=("${packages[@]}")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            sudo apt-get update
            sudo apt-get install -y "${missing[@]}"
          fi

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: advanced-analysis-vcpkg-${{ env.VCPKG_CACHE_VERSION }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            advanced-analysis-vcpkg-${{ env.VCPKG_CACHE_VERSION }}-${{ env.VCPKG_COMMIT }}-
            advanced-analysis-vcpkg-${{ env.VCPKG_COMMIT }}-

      - name: Cache mono for vcpkg NuGet (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1.4.3
        with:
          packages: mono-complete
          version: vcpkg-nuget-1

      - name: Install mono for vcpkg NuGet (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if ! brew list --formula mono >/dev/null 2>&1; then
            brew install mono
          fi

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          set -euo pipefail
          vcpkg_root="$PWD/.sdeps/vcpkg"
          vcpkg_binary_cache="$PWD/.sdeps/vcpkg-bincache"
          mkdir -p "$vcpkg_binary_cache"
          if [ ! -d "$vcpkg_root" ]; then
            mkdir -p "$(dirname "$vcpkg_root")"
            git clone https://github.com/microsoft/vcpkg.git "$vcpkg_root"
          fi
          git -C "$vcpkg_root" fetch origin
          git -C "$vcpkg_root" checkout "$VCPKG_COMMIT"
          if [ ! -x "$vcpkg_root/vcpkg" ]; then
            "$vcpkg_root/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$vcpkg_root" >> "$GITHUB_ENV"
          echo "VCPKG_DEFAULT_BINARY_CACHE=$vcpkg_binary_cache" >> "$GITHUB_ENV"
          if [ -n "${NUGET_PAT:-}" ] && command -v mono >/dev/null 2>&1; then
            nuget_path="$("$vcpkg_root/vcpkg" fetch nuget | tail -n 1)"
            mono "$nuget_path" sources add -Source "$NUGET_FEED_URL" -StorePasswordInClearText -Name GitHubPackages -UserName "$NUGET_USERNAME" -Password "$NUGET_PAT" >/dev/null 2>&1 || true
            mono "$nuget_path" setapikey "$NUGET_PAT" -Source "$NUGET_FEED_URL" >/dev/null 2>&1 || true
          else
            if [ -z "${NUGET_PAT:-}" ]; then
              echo "::notice::NUGET_PAT secret not set; using local file binary cache only"
            else
              echo "::warning::mono not available; using local file binary cache only"
            fi
            echo "VCPKG_BINARY_SOURCES=default,readwrite" >> "$GITHUB_ENV"
          fi

      - name: Configure compile database
        shell: bash
        run: |
          set -euo pipefail
          cmake \
            --preset linux-clang \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_MAKE_PROGRAM="$(command -v ninja)" \
            -DSLOPPY_ENABLE_WERROR=OFF \
            -DSLOPPY_ENABLE_V8=OFF \
            -DSLOPPY_ENGINE=none \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Save vcpkg cache after configure
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: advanced-analysis-vcpkg-${{ env.VCPKG_CACHE_VERSION }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Run repo-wide clang-tidy analyzer profile
        shell: bash
        run: cmake --build --preset linux-clang --target sloppy_memory_analysis
