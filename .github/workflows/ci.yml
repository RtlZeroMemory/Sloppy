name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  windows:
    name: Windows foundation
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Ensure Ninja
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y --no-progress
          }

      - name: Toolchain bootstrap
        shell: pwsh
        run: .\tools\windows\bootstrap.ps1

      - name: Check tracked generated artifacts
        shell: pwsh
        run: |
          $tracked = git ls-files -- build compiler/target target .sdeps .sloppy "*.exe" "*.pdb" "*.zip" "*.7z" "*.tar.gz"
          if ($tracked) {
            Write-Error "Generated artifacts are tracked:`n$($tracked -join "`n")"
          }

      - name: Configure
        shell: pwsh
        run: .\tools\windows\dev.ps1 configure -Preset windows-dev -CMakeArgs "-DSLOPPY_ENABLE_WERROR=ON"

      - name: Build
        shell: pwsh
        run: .\tools\windows\dev.ps1 build -Preset windows-dev

      - name: Test
        shell: pwsh
        run: .\tools\windows\dev.ps1 test -Preset windows-dev

      - name: Build sloppyc directly
        shell: pwsh
        run: cargo build --manifest-path compiler/Cargo.toml

      - name: Rust format
        shell: pwsh
        run: cargo fmt --manifest-path compiler/Cargo.toml -- --check

      - name: Rust clippy
        shell: pwsh
        run: cargo clippy --manifest-path compiler/Cargo.toml -- -D warnings

      - name: Rust tests
        shell: pwsh
        run: cargo test --manifest-path compiler/Cargo.toml

      - name: Format check
        shell: pwsh
        run: .\tools\windows\dev.ps1 format-check -Preset windows-dev

      - name: Lint including C standards scanner
        shell: pwsh
        run: .\tools\windows\dev.ps1 lint -Preset windows-dev
