name: ci

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      enable_v8:
        description: "Run the optional V8 SDK gate."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      v8_root:
        description: "Absolute path to a preinstalled Windows V8 SDK on the runner."
        required: false
        default: ""
        type: string
      advanced_analysis:
        description: "Run the optional clang-tidy/analyzer memory-analysis lane."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      live_provider:
        description: "Run Docker-backed provider live lanes."
        required: true
        default: "none"
        type: choice
        options:
          - "none"
          - "postgres"
          - "sqlserver"
          - "all"

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  VCPKG_COMMIT: 031f4afe03be385aee354f15be6e6b1fe57497c7
  VCPKG_CACHE_VERSION: v3
  VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/RtlZeroMemory/index.json,readwrite"
  NUGET_FEED_URL: "https://nuget.pkg.github.com/RtlZeroMemory/index.json"
  NUGET_USERNAME: "RtlZeroMemory"
  NUGET_PAT: ${{ secrets.VCPKG_PAT }}

jobs:
  changes:
    name: ci-fast / changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.changed.outputs.docs_only }}
      native_relevant: ${{ steps.changed.outputs.native_relevant }}
      rust_relevant: ${{ steps.changed.outputs.rust_relevant }}
      simd_relevant: ${{ steps.changed.outputs.simd_relevant }}
      analysis_relevant: ${{ steps.changed.outputs.analysis_relevant }}
      windows_tooling_relevant: ${{ steps.changed.outputs.windows_tooling_relevant }}
      provider_relevant: ${{ steps.changed.outputs.provider_relevant }}
      package_relevant: ${{ steps.changed.outputs.package_relevant }}
      unix_matrix: ${{ steps.unix-matrix.outputs.unix_matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: changed
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "native_relevant=true" >> "$GITHUB_OUTPUT"
            echo "rust_relevant=true" >> "$GITHUB_OUTPUT"
            echo "simd_relevant=false" >> "$GITHUB_OUTPUT"
            echo "analysis_relevant=false" >> "$GITHUB_OUTPUT"
            echo "windows_tooling_relevant=true" >> "$GITHUB_OUTPUT"
            echo "provider_relevant=true" >> "$GITHUB_OUTPUT"
            echo "package_relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ] && git rev-parse --verify HEAD^2 >/dev/null 2>&1; then
            mapfile -t files < <(git diff --name-only HEAD^1 HEAD^2)
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            mapfile -t files < <(git diff --name-only "$base" "$head")
          elif [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.event.before }}" ]; then
            mapfile -t files < <(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            mapfile -t files < <(git diff --name-only HEAD^ HEAD)
          else
            mapfile -t files < <(git diff-tree --no-commit-id --name-only -r HEAD)
          fi

          docs_only=true
          native_relevant=false
          rust_relevant=false
          simd_relevant=false
          analysis_relevant=false
          windows_tooling_relevant=false
          provider_relevant=false
          package_relevant=false
          if [ "${#files[@]}" -eq 0 ]; then
            docs_only=false
            native_relevant=true
            rust_relevant=true
            analysis_relevant=true
            package_relevant=true
          fi

          echo "Changed files:"
          for file in "${files[@]}"; do
            echo "  $file"
            case "$file" in
              docs/*|adr/*|*.md)
                ;;
              *)
                docs_only=false
                ;;
            esac

            case "$file" in
              CMakeLists.txt|CMakePresets.json|vcpkg.json|vcpkg-configuration.json|\
              include/**|src/**|tests/**|benchmarks/**|third_party/**|tools/golden/**)
                native_relevant=true
                ;;
            esac

            case "$file" in
                .github/workflows/ci.yml|docs/reference/providers.md|docs/internals/provider-runtime.md|docs/contributor/quality-gates.md|docs/contributor/testing.md)
                provider_relevant=true
                ;;
              include/sloppy/data*|src/data/**|src/core/provider_executor.c)
                provider_relevant=true
                ;;
              src/engine/v8/intrinsics_*sqlite*|src/engine/v8/intrinsics_*postgres*|src/engine/v8/intrinsics_*sqlserver*)
                provider_relevant=true
                ;;
              stdlib/sloppy/data.js|tests/live/**|tests/unit/data/**|tests/conformance/providers/**)
                provider_relevant=true
                ;;
              tools/windows/test-live-*|tools/unix/test-live-*)
                provider_relevant=true
                ;;
            esac

            case "$file" in
              compiler/**|stdlib/sloppy/**)
                rust_relevant=true
                ;;
            esac

            case "$file" in
              CMakeLists.txt|CMakePresets.json|\
              include/sloppy/bytes.h|include/sloppy/string.h|include/sloppy/builder.h|\
              src/core/bytes*|src/core/string*|src/core/builder*|\
              tests/unit/core/test_bytes.c|tests/unit/core/test_string.c|tests/unit/core/test_builder.c|\
              tests/fuzz/fuzz_memory_primitives.c|benchmarks/bench_memory.c|benchmarks/README.md)
                simd_relevant=true
                ;;
            esac

            case "$file" in
              .clang-tidy|CMakeLists.txt|CMakePresets.json|vcpkg.json|vcpkg-configuration.json|\
              include/**|src/**|tests/**|benchmarks/**|third_party/**)
                analysis_relevant=true
                ;;
            esac

            case "$file" in
              .github/workflows/ci.yml|.github/workflows/release-artifacts.yml|.github/workflows/test-engine-*.yml|tools/deps/**|tools/windows/**|tools/unix/**|tools/golden/**)
                windows_tooling_relevant=true
                ;;
            esac

            case "$file" in
              .github/workflows/ci.yml|.github/workflows/release-artifacts.yml|\
              tools/windows/package.ps1|tools/windows/test-package.ps1|\
              tools/windows/check-release-artifacts.ps1|\
              tools/windows/release-dry-run.ps1|tools/unix/release-dry-run.sh|\
              tools/windows/dev.ps1|tools/windows/npm-dry-run.ps1|tools/unix/package.sh|tools/unix/test-package.sh|\
                tools/unix/dev.sh|templates/**|src/main.c|tests/fixtures/package/**|docs/release/artifact-contract.md|docs/contributor/release-artifacts.md|\
              docs/release/**|RELEASE_NOTES.md|CHANGELOG.md|\
              docs/contributor/testing.md|docs/cli/**|packages/npm/**)
                package_relevant=true
                ;;
            esac
          done

          echo "docs_only=$docs_only"
          echo "native_relevant=$native_relevant"
          echo "rust_relevant=$rust_relevant"
          echo "simd_relevant=$simd_relevant"
          echo "analysis_relevant=$analysis_relevant"
          echo "windows_tooling_relevant=$windows_tooling_relevant"
          echo "provider_relevant=$provider_relevant"
          echo "package_relevant=$package_relevant"
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          echo "native_relevant=$native_relevant" >> "$GITHUB_OUTPUT"
          echo "rust_relevant=$rust_relevant" >> "$GITHUB_OUTPUT"
          echo "simd_relevant=$simd_relevant" >> "$GITHUB_OUTPUT"
          echo "analysis_relevant=$analysis_relevant" >> "$GITHUB_OUTPUT"
          echo "windows_tooling_relevant=$windows_tooling_relevant" >> "$GITHUB_OUTPUT"
          echo "provider_relevant=$provider_relevant" >> "$GITHUB_OUTPUT"
          echo "package_relevant=$package_relevant" >> "$GITHUB_OUTPUT"

      - name: Compute unix matrix
        id: unix-matrix
        shell: bash
        env:
          HAS_FULL_CI: ${{ contains(github.event.pull_request.labels.*.name, 'full-ci') }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          clang_entry='{"name":"linux-clang","runner":"ubuntu-latest","preset":"linux-clang","cc":"clang","cxx":"clang++","compiler_packages":"clang"}'
          gcc_entry='{"name":"linux-gcc","runner":"ubuntu-latest","preset":"linux-gcc","cc":"gcc","cxx":"g++","compiler_packages":"gcc g++"}'
          macos_entry='{"name":"macos","runner":"macos-latest","preset":"macos-clang","cc":"clang","cxx":"clang++"}'
          if [ "$EVENT_NAME" = "pull_request" ] && [ "$HAS_FULL_CI" != "true" ]; then
            # PR without full-ci label: only linux-clang
            matrix="{\"include\":[$clang_entry]}"
          else
            # Schedule, push, dispatch, or PR with full-ci: all three
            matrix="{\"include\":[$clang_entry,$gcc_entry,$macos_entry]}"
          fi
          echo "unix_matrix=$matrix" >> "$GITHUB_OUTPUT"

  ci-fast:
    name: ci-fast / static
    runs-on: windows-latest
    needs: changes

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check whitespace
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "pull_request" -and (git rev-parse --verify "HEAD^2" 2>$null)) {
            git diff --check HEAD^1 HEAD^2
          } elseif (git rev-parse --verify "HEAD^" 2>$null) {
            git diff --check HEAD^ HEAD
          } else {
            git diff-tree --check --root --no-commit-id -r HEAD
          }
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Check tracked generated artifacts
        shell: pwsh
        run: |
          $tracked = git ls-files -- build compiler/target target .sdeps .sloppy vcpkg_installed artifacts "*.exe" "*.pdb" "*.zip" "*.7z" "*.tar.gz" "*.tgz"
          if ($tracked) {
            Write-Error "Generated artifacts are tracked:`n$($tracked -join "`n")"
          }

      - name: Standards and docs freshness scanners
        shell: pwsh
        run: |
          .\tools\windows\check-platform-boundaries.ps1
          .\tools\windows\check-physical-boundaries.ps1
          .\tools\windows\check-c-standards.ps1 -SelfTest
          .\tools\windows\check-c-standards.ps1
          .\tools\windows\check-js-ts-standards.ps1
          .\tools\windows\check-rust-standards.ps1
          .\tools\windows\check-docs-freshness.ps1
          .\tools\windows\check-core-api-integration.ps1 -SelfTest
          .\tools\windows\check-core-api-integration.ps1
          .\tools\windows\check-test-governance.ps1 -SelfTest
          .\tools\windows\check-test-governance.ps1
          .\tools\windows\check-release-artifacts.ps1 -SelfTest
          .\tools\windows\check-release-artifacts.ps1

      - name: Format check
        shell: pwsh
        run: .\tools\windows\dev.ps1 format-check -Preset windows-dev

  rust:
    name: rust
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_relevant == 'true' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler -> target
          cache-on-failure: true

      - name: Rust format
        run: cargo fmt --manifest-path compiler/Cargo.toml -- --check

      - name: Rust clippy
        run: cargo clippy --manifest-path compiler/Cargo.toml -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path compiler/Cargo.toml

  windows-fast:
    name: windows-fast
    runs-on: windows-latest
    needs: changes
    # Windows Debug is the local developer gate mirror. It is the default
    # Windows platform signal for native PRs; sanitizer/fuzzer Windows presets
    # are heavier opt-in lanes.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.head_ref != 'alpha-release-package' && (
        needs.changes.outputs.native_relevant == 'true' ||
        needs.changes.outputs.windows_tooling_relevant == 'true' ||
        contains(github.event.pull_request.labels.*.name, 'full-ci') ||
        contains(github.event.pull_request.labels.*.name, 'windows-debug')
      ))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler -> target
          cache-on-failure: true

      - name: Ensure Ninja
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y --no-progress
          }

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: windows-vcpkg-${{ env.VCPKG_CACHE_VERSION }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            windows-vcpkg-${{ env.VCPKG_CACHE_VERSION }}-${{ env.VCPKG_COMMIT }}-
            windows-vcpkg-${{ env.VCPKG_COMMIT }}-
            windows-vcpkg-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $PWD ".sdeps/vcpkg"
          $vcpkgBinaryCache = Join-Path $PWD ".sdeps/vcpkg-bincache"
          New-Item -ItemType Directory -Force -Path $vcpkgBinaryCache | Out-Null
          if (-not (Test-Path -LiteralPath $vcpkgRoot)) {
            New-Item -ItemType Directory -Force -Path (Split-Path -Parent $vcpkgRoot) | Out-Null
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          }
          git -C $vcpkgRoot fetch origin
          git -C $vcpkgRoot checkout $env:VCPKG_COMMIT
          if (-not (Test-Path -LiteralPath (Join-Path $vcpkgRoot "vcpkg.exe"))) {
            & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat") -disableMetrics
          }
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_DEFAULT_BINARY_CACHE=$vcpkgBinaryCache" | Out-File -FilePath $env:GITHUB_ENV -Append
          if (-not [string]::IsNullOrWhiteSpace($env:NUGET_PAT)) {
            $vcpkgExe = Join-Path $vcpkgRoot "vcpkg.exe"
            $nugetExe = & $vcpkgExe fetch nuget | Select-Object -Last 1
            & $nugetExe sources add -Source $env:NUGET_FEED_URL -StorePasswordInClearText -Name GitHubPackages -UserName $env:NUGET_USERNAME -Password $env:NUGET_PAT 2>&1 | Out-Null
            & $nugetExe setapikey $env:NUGET_PAT -Source $env:NUGET_FEED_URL 2>&1 | Out-Null
          } else {
            Write-Host "::notice::NUGET_PAT secret not set; using local file binary cache only"
            "VCPKG_BINARY_SOURCES=default,readwrite" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Toolchain bootstrap
        shell: pwsh
        run: .\tools\windows\bootstrap.ps1

      - name: Configure
        shell: pwsh
        run: .\tools\windows\dev.ps1 configure -Preset windows-dev -CMakeArgs "-DSLOPPY_ENABLE_WERROR=ON"

      - name: Save vcpkg cache after configure
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: windows-vcpkg-${{ env.VCPKG_CACHE_VERSION }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Build
        shell: pwsh
        run: .\tools\windows\dev.ps1 build -Preset windows-dev

      - name: Provider gate report
        shell: pwsh
        run: |
          Write-Host "Provider gate report:"
          Write-Host "- default SQLite provider tests: run in-memory through CTest."
          Write-Host "- default PostgreSQL provider tests: run non-live diagnostics through CTest."
          if ([string]::IsNullOrWhiteSpace($env:SLOPPY_POSTGRES_TEST_URL)) {
            Write-Host "- live PostgreSQL provider tests: skipped because SLOPPY_POSTGRES_TEST_URL is not set."
          } else {
            Write-Host "- live PostgreSQL provider tests: enabled because SLOPPY_POSTGRES_TEST_URL is set."
          }
          Write-Host "- default SQL Server provider tests: run ODBC diagnostics through CTest."
          if ([string]::IsNullOrWhiteSpace($env:SLOPPY_SQLSERVER_TEST_CONNECTION_STRING)) {
            Write-Host "- live SQL Server provider tests: skipped because SLOPPY_SQLSERVER_TEST_CONNECTION_STRING is not set."
          } else {
            Write-Host "- live SQL Server provider tests: enabled because SLOPPY_SQLSERVER_TEST_CONNECTION_STRING is set."
          }

      - name: Test
        shell: pwsh
        run: ctest --preset windows-dev --output-on-failure

  provider-live:
    name: provider-live / docker-backed
    runs-on: windows-latest
    needs: changes
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.live_provider != 'none') ||
      (github.event_name == 'pull_request' && (
        contains(github.event.pull_request.labels.*.name, 'live-postgres') ||
        contains(github.event.pull_request.labels.*.name, 'live-sqlserver') ||
        contains(github.event.pull_request.labels.*.name, 'live-providers') ||
        contains(github.event.pull_request.labels.*.name, 'full-ci')
      ))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Ensure Ninja
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y --no-progress
          }

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: windows-provider-live-${{ env.VCPKG_CACHE_VERSION }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            windows-provider-live-${{ env.VCPKG_CACHE_VERSION }}-${{ env.VCPKG_COMMIT }}-
            windows-provider-live-${{ env.VCPKG_COMMIT }}-
            windows-vcpkg-${{ env.VCPKG_CACHE_VERSION }}-${{ env.VCPKG_COMMIT }}-
            windows-vcpkg-${{ env.VCPKG_COMMIT }}-
            windows-vcpkg-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $PWD ".sdeps/vcpkg"
          $vcpkgBinaryCache = Join-Path $PWD ".sdeps/vcpkg-bincache"
          New-Item -ItemType Directory -Force -Path $vcpkgBinaryCache | Out-Null
          if (-not (Test-Path -LiteralPath $vcpkgRoot)) {
            New-Item -ItemType Directory -Force -Path (Split-Path -Parent $vcpkgRoot) | Out-Null
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          }
          git -C $vcpkgRoot fetch origin
          git -C $vcpkgRoot checkout $env:VCPKG_COMMIT
          if (-not (Test-Path -LiteralPath (Join-Path $vcpkgRoot "vcpkg.exe"))) {
            & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat") -disableMetrics
          }
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_DEFAULT_BINARY_CACHE=$vcpkgBinaryCache" | Out-File -FilePath $env:GITHUB_ENV -Append
          if (-not [string]::IsNullOrWhiteSpace($env:NUGET_PAT)) {
            $vcpkgExe = Join-Path $vcpkgRoot "vcpkg.exe"
            $nugetExe = & $vcpkgExe fetch nuget | Select-Object -Last 1
            & $nugetExe sources add -Source $env:NUGET_FEED_URL -StorePasswordInClearText -Name GitHubPackages -UserName $env:NUGET_USERNAME -Password $env:NUGET_PAT 2>&1 | Out-Null
            & $nugetExe setapikey $env:NUGET_PAT -Source $env:NUGET_FEED_URL 2>&1 | Out-Null
          } else {
            Write-Host "::notice::NUGET_PAT secret not set; using local file binary cache only"
            "VCPKG_BINARY_SOURCES=default,readwrite" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Toolchain bootstrap
        shell: pwsh
        run: .\tools\windows\bootstrap.ps1

      - name: Configure provider live preset
        shell: pwsh
        run: .\tools\windows\dev.ps1 configure -Preset windows-relwithdebinfo

      - name: Save vcpkg cache after configure
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: windows-provider-live-${{ env.VCPKG_CACHE_VERSION }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Run selected provider live lanes
        shell: pwsh
        run: |
          $provider = "all"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $provider = "${{ inputs.live_provider }}"
          } elseif ("${{ github.event_name }}" -eq "pull_request") {
            if ("${{ contains(github.event.pull_request.labels.*.name, 'live-postgres') }}" -eq "true") {
              $provider = "postgres"
            }
            if ("${{ contains(github.event.pull_request.labels.*.name, 'live-sqlserver') }}" -eq "true") {
              $provider = if ($provider -eq "postgres") { "all" } else { "sqlserver" }
            }
          }
          .\tools\windows\test-live-providers.ps1 -Provider $provider -Preset windows-relwithdebinfo

  windows-package-smoke:
    name: windows-package-smoke
    runs-on: windows-latest
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && (contains(github.event.pull_request.labels.*.name, 'full-ci') || contains(github.event.pull_request.labels.*.name, 'package-smoke')))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler -> target
          cache-on-failure: true

      - name: Ensure Ninja
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y --no-progress
          }

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: windows-vcpkg-${{ env.VCPKG_CACHE_VERSION }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            windows-vcpkg-${{ env.VCPKG_CACHE_VERSION }}-${{ env.VCPKG_COMMIT }}-
            windows-vcpkg-${{ env.VCPKG_COMMIT }}-
            windows-vcpkg-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $PWD ".sdeps/vcpkg"
          $vcpkgBinaryCache = Join-Path $PWD ".sdeps/vcpkg-bincache"
          New-Item -ItemType Directory -Force -Path $vcpkgBinaryCache | Out-Null
          if (-not (Test-Path -LiteralPath $vcpkgRoot)) {
            New-Item -ItemType Directory -Force -Path (Split-Path -Parent $vcpkgRoot) | Out-Null
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          }
