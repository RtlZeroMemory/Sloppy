name: ci

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      enable_v8:
        description: "Run the optional V8 SDK gate."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      v8_root:
        description: "Absolute path to a preinstalled Windows V8 SDK on the runner."
        required: false
        default: ""
        type: string
      advanced_analysis:
        description: "Run the optional clang-tidy/analyzer memory-analysis lane."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  VCPKG_COMMIT: 031f4afe03be385aee354f15be6e6b1fe57497c7

jobs:
  changes:
    name: ci-fast / changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.changed.outputs.docs_only }}
      simd_relevant: ${{ steps.changed.outputs.simd_relevant }}
      analysis_relevant: ${{ steps.changed.outputs.analysis_relevant }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: changed
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "simd_relevant=false" >> "$GITHUB_OUTPUT"
            echo "analysis_relevant=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ] && git rev-parse --verify HEAD^2 >/dev/null 2>&1; then
            mapfile -t files < <(git diff --name-only HEAD^1 HEAD^2)
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            mapfile -t files < <(git diff --name-only "$base" "$head")
          elif [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.event.before }}" ]; then
            mapfile -t files < <(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            mapfile -t files < <(git diff --name-only HEAD^ HEAD)
          else
            mapfile -t files < <(git diff-tree --no-commit-id --name-only -r HEAD)
          fi

          docs_only=true
          simd_relevant=false
          analysis_relevant=false
          if [ "${#files[@]}" -eq 0 ]; then
            docs_only=false
            analysis_relevant=true
          fi

          for file in "${files[@]}"; do
            case "$file" in
              docs/*|adr/*|*.md)
                ;;
              *)
                docs_only=false
                ;;
            esac

            case "$file" in
              .github/workflows/ci.yml|CMakeLists.txt|CMakePresets.json|\
              include/sloppy/bytes.h|include/sloppy/string.h|include/sloppy/builder.h|\
              src/core/bytes*|src/core/string*|src/core/builder*|\
              tests/unit/core/test_bytes.c|tests/unit/core/test_string.c|tests/unit/core/test_builder.c|\
              tests/fuzz/fuzz_memory_primitives.c|benchmarks/bench_memory.c|benchmarks/README.md)
                simd_relevant=true
                ;;
            esac

            case "$file" in
              .clang-tidy|.github/workflows/*|CMakeLists.txt|CMakePresets.json|vcpkg.json|vcpkg-configuration.json|\
              include/**|src/**|tests/**|benchmarks/**|compiler/**|stdlib/**|examples/**|tools/**|third_party/**)
                analysis_relevant=true
                ;;
            esac
          done

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          echo "simd_relevant=$simd_relevant" >> "$GITHUB_OUTPUT"
          echo "analysis_relevant=$analysis_relevant" >> "$GITHUB_OUTPUT"

  ci-fast:
    name: ci-fast / static
    runs-on: windows-latest
    needs: changes

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check whitespace
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "pull_request" -and (git rev-parse --verify "HEAD^2" 2>$null)) {
            git diff --check HEAD^1 HEAD^2
          } elseif (git rev-parse --verify "HEAD^" 2>$null) {
            git diff --check HEAD^ HEAD
          } else {
            git diff-tree --check --root --no-commit-id -r HEAD
          }
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Check tracked generated artifacts
        shell: pwsh
        run: |
          $tracked = git ls-files -- build compiler/target target .sdeps .sloppy vcpkg_installed artifacts "*.exe" "*.pdb" "*.zip" "*.7z" "*.tar.gz"
          if ($tracked) {
            Write-Error "Generated artifacts are tracked:`n$($tracked -join "`n")"
          }

      - name: Standards and docs freshness scanners
        shell: pwsh
        run: |
          .\tools\windows\check-platform-boundaries.ps1
          .\tools\windows\check-c-standards.ps1 -SelfTest
          .\tools\windows\check-c-standards.ps1
          .\tools\windows\check-js-ts-standards.ps1
          .\tools\windows\check-rust-standards.ps1
          .\tools\windows\check-docs-freshness.ps1
          .\tools\windows\check-core-api-integration.ps1 -SelfTest
          .\tools\windows\check-core-api-integration.ps1
          .\tools\windows\check-test-governance.ps1 -SelfTest
          .\tools\windows\check-test-governance.ps1
          .\tools\windows\check-alpha-infra.ps1 -SelfTest
          .\tools\windows\check-alpha-infra.ps1

  rust:
    name: rust
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler -> target
          cache-on-failure: true

      - name: Rust format
        run: cargo fmt --manifest-path compiler/Cargo.toml -- --check

      - name: Rust clippy
        run: cargo clippy --manifest-path compiler/Cargo.toml -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path compiler/Cargo.toml

  windows-fast:
    name: windows-fast
    runs-on: windows-latest
    needs: changes
    if: github.event_name != 'workflow_dispatch' && (needs.changes.outputs.docs_only != 'true' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci')))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler -> target
          cache-on-failure: true

      - name: Ensure Ninja
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y --no-progress
          }

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: windows-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            windows-vcpkg-${{ env.VCPKG_COMMIT }}-
            windows-vcpkg-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $PWD ".sdeps/vcpkg"
          $vcpkgBinaryCache = Join-Path $PWD ".sdeps/vcpkg-bincache"
          New-Item -ItemType Directory -Force -Path $vcpkgBinaryCache | Out-Null
          if (-not (Test-Path -LiteralPath $vcpkgRoot)) {
            New-Item -ItemType Directory -Force -Path (Split-Path -Parent $vcpkgRoot) | Out-Null
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          }
          git -C $vcpkgRoot fetch origin
          git -C $vcpkgRoot checkout $env:VCPKG_COMMIT
          if (-not (Test-Path -LiteralPath (Join-Path $vcpkgRoot "vcpkg.exe"))) {
            & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat") -disableMetrics
          }
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_DEFAULT_BINARY_CACHE=$vcpkgBinaryCache" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Toolchain bootstrap
        shell: pwsh
        run: .\tools\windows\bootstrap.ps1

      - name: Configure
        shell: pwsh
        run: .\tools\windows\dev.ps1 configure -Preset windows-dev -CMakeArgs "-DSLOPPY_ENABLE_WERROR=ON"

      - name: Save vcpkg cache after configure
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: windows-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Build
        shell: pwsh
        run: .\tools\windows\dev.ps1 build -Preset windows-dev

      - name: Test
        shell: pwsh
        run: ctest --preset windows-dev --output-on-failure

      - name: Format check
        shell: pwsh
        run: .\tools\windows\dev.ps1 format-check -Preset windows-dev

  memory-safety:
    name: memory-safety / ${{ matrix.name }}
    runs-on: windows-latest
    needs: changes

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-asan
            preset: windows-asan
            test_label: ""
          - name: windows-libfuzzer
            preset: windows-libfuzzer
            test_label: fuzz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler -> target
          cache-on-failure: true

      - name: Ensure Ninja
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y --no-progress
          }

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: windows-memory-safety-${{ matrix.preset }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            windows-memory-safety-${{ matrix.preset }}-${{ env.VCPKG_COMMIT }}-
            windows-vcpkg-${{ env.VCPKG_COMMIT }}-
            windows-vcpkg-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $PWD ".sdeps/vcpkg"
          $vcpkgBinaryCache = Join-Path $PWD ".sdeps/vcpkg-bincache"
          New-Item -ItemType Directory -Force -Path $vcpkgBinaryCache | Out-Null
          if (-not (Test-Path -LiteralPath $vcpkgRoot)) {
            New-Item -ItemType Directory -Force -Path (Split-Path -Parent $vcpkgRoot) | Out-Null
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          }
          git -C $vcpkgRoot fetch origin
          git -C $vcpkgRoot checkout $env:VCPKG_COMMIT
          if (-not (Test-Path -LiteralPath (Join-Path $vcpkgRoot "vcpkg.exe"))) {
            & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat") -disableMetrics
          }
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_DEFAULT_BINARY_CACHE=$vcpkgBinaryCache" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Toolchain bootstrap
        shell: pwsh
        run: .\tools\windows\bootstrap.ps1

      - name: Configure
        shell: pwsh
        run: .\tools\windows\dev.ps1 configure -Preset "${{ matrix.preset }}"

      - name: Save vcpkg cache after configure
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: windows-memory-safety-${{ matrix.preset }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Build
        shell: pwsh
        run: .\tools\windows\dev.ps1 build -Preset "${{ matrix.preset }}"

      - name: Test
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ matrix.test_label }}")) {
            ctest --preset "${{ matrix.preset }}" --output-on-failure
          } else {
            ctest --preset "${{ matrix.preset }}" -L "${{ matrix.test_label }}" --output-on-failure
          }

  memory-safety-linux:
    name: memory-safety / linux-asan-ubsan
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler -> target
          cache-on-failure: true

      - name: Install host dependencies
        shell: bash
        run: |
          set -euo pipefail
          packages=(build-essential clang cmake ninja-build pkg-config curl zip unzip tar autoconf autoconf-archive automake libtool bison flex ccache)
          missing=()

          for command in clang clang++ cmake ninja pkg-config curl zip unzip tar autoconf automake libtoolize bison flex ccache; do
            if ! command -v "$command" >/dev/null 2>&1; then
              missing=("${packages[@]}")
              break
            fi
          done
          if ! dpkg-query -W -f='${Status}' autoconf-archive 2>/dev/null | grep -q "install ok installed"; then
            missing=("${packages[@]}")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            sudo apt-get update
            sudo apt-get install -y "${missing[@]}"
          fi

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: linux-sanitizers-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            linux-sanitizers-vcpkg-${{ env.VCPKG_COMMIT }}-
            Linux-linux-clang-vcpkg-${{ env.VCPKG_COMMIT }}-

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          set -euo pipefail
          vcpkg_root="$PWD/.sdeps/vcpkg"
          vcpkg_binary_cache="$PWD/.sdeps/vcpkg-bincache"
          mkdir -p "$vcpkg_binary_cache"
          if [ ! -d "$vcpkg_root" ]; then
            mkdir -p "$(dirname "$vcpkg_root")"
            git clone https://github.com/microsoft/vcpkg.git "$vcpkg_root"
          fi
          git -C "$vcpkg_root" fetch origin
          git -C "$vcpkg_root" checkout "$VCPKG_COMMIT"
          if [ ! -x "$vcpkg_root/vcpkg" ]; then
            "$vcpkg_root/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$vcpkg_root" >> "$GITHUB_ENV"
          echo "VCPKG_DEFAULT_BINARY_CACHE=$vcpkg_binary_cache" >> "$GITHUB_ENV"

      - name: Configure
        shell: bash
        env:
          CC: clang
          CXX: clang++
        run: |
          set -euo pipefail
          cmake \
            --preset linux-sanitizers \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_MAKE_PROGRAM="$(command -v ninja)" \
            -DSLOPPY_ENABLE_V8=OFF \
            -DSLOPPY_ENGINE=none \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Save vcpkg cache after configure
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: linux-sanitizers-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Build
        shell: bash
        run: cmake --build --preset linux-sanitizers

      - name: Test
        shell: bash
        run: ctest --preset linux-sanitizers --output-on-failure

  memory-simd:
    name: memory-simd / ${{ matrix.name }}
    runs-on: windows-latest
    needs: changes
    if: github.event_name != 'workflow_dispatch' && (needs.changes.outputs.simd_relevant == 'true' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci')))

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-simd
            preset: windows-simd
          - name: windows-avx2
            preset: windows-avx2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler -> target
          cache-on-failure: true

      - name: Ensure Ninja
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y --no-progress
          }

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: windows-memory-simd-${{ matrix.preset }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            windows-memory-simd-${{ matrix.preset }}-${{ env.VCPKG_COMMIT }}-
            windows-memory-simd-${{ env.VCPKG_COMMIT }}-
            windows-vcpkg-${{ env.VCPKG_COMMIT }}-
            windows-vcpkg-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $PWD ".sdeps/vcpkg"
          $vcpkgBinaryCache = Join-Path $PWD ".sdeps/vcpkg-bincache"
          New-Item -ItemType Directory -Force -Path $vcpkgBinaryCache | Out-Null
          if (-not (Test-Path -LiteralPath $vcpkgRoot)) {
            New-Item -ItemType Directory -Force -Path (Split-Path -Parent $vcpkgRoot) | Out-Null
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          }
          git -C $vcpkgRoot fetch origin
          git -C $vcpkgRoot checkout $env:VCPKG_COMMIT
          if (-not (Test-Path -LiteralPath (Join-Path $vcpkgRoot "vcpkg.exe"))) {
            & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat") -disableMetrics
          }
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_DEFAULT_BINARY_CACHE=$vcpkgBinaryCache" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Toolchain bootstrap
        shell: pwsh
        run: .\tools\windows\bootstrap.ps1

      - name: Configure
        shell: pwsh
        run: .\tools\windows\dev.ps1 configure -Preset "${{ matrix.preset }}"

      - name: Save vcpkg cache after configure
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: windows-memory-simd-${{ matrix.preset }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Build
        shell: pwsh
        run: .\tools\windows\dev.ps1 build -Preset "${{ matrix.preset }}"

      - name: SIMD parity, seed replay, and benchmark smoke
        shell: pwsh
        run: ctest --preset "${{ matrix.preset }}" -R "core\.(bytes|str)|fuzz\.memory_primitives\.seed_replay|benchmarks\.sloppy_bench" --output-on-failure

  # The full Windows local-gate mirror is opt-in during pre-alpha iteration.
  # Normal non-docs changes already run windows-fast plus the Unix platform matrix below.
  windows:
    name: ci-full / windows
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler -> target
          cache-on-failure: true

      - name: Ensure Ninja
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y --no-progress
          }

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: windows-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            windows-vcpkg-${{ env.VCPKG_COMMIT }}-
            windows-vcpkg-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $PWD ".sdeps/vcpkg"
          $vcpkgBinaryCache = Join-Path $PWD ".sdeps/vcpkg-bincache"
          New-Item -ItemType Directory -Force -Path $vcpkgBinaryCache | Out-Null
          if (-not (Test-Path -LiteralPath $vcpkgRoot)) {
            New-Item -ItemType Directory -Force -Path (Split-Path -Parent $vcpkgRoot) | Out-Null
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          }
          git -C $vcpkgRoot fetch origin
          git -C $vcpkgRoot checkout $env:VCPKG_COMMIT
          if (-not (Test-Path -LiteralPath (Join-Path $vcpkgRoot "vcpkg.exe"))) {
            & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat") -disableMetrics
          }
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_DEFAULT_BINARY_CACHE=$vcpkgBinaryCache" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Toolchain bootstrap
        shell: pwsh
        run: .\tools\windows\bootstrap.ps1

      - name: Check tracked generated artifacts
        shell: pwsh
        run: |
          $tracked = git ls-files -- build compiler/target target .sdeps .sloppy vcpkg_installed artifacts "*.exe" "*.pdb" "*.zip" "*.7z" "*.tar.gz"
          if ($tracked) {
            Write-Error "Generated artifacts are tracked:`n$($tracked -join "`n")"
          }

      - name: Configure
        shell: pwsh
        run: .\tools\windows\dev.ps1 configure -Preset windows-dev -CMakeArgs "-DSLOPPY_ENABLE_WERROR=ON"

      - name: Save vcpkg cache after configure
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: windows-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Build
        shell: pwsh
        run: .\tools\windows\dev.ps1 build -Preset windows-dev

      - name: Provider gate report
        shell: pwsh
        run: |
          Write-Host "Provider gate report:"
          Write-Host "- default SQLite provider tests: run in-memory through CTest."
          Write-Host "- default PostgreSQL provider tests: run non-live diagnostics through CTest."
          if ([string]::IsNullOrWhiteSpace($env:SLOPPY_POSTGRES_TEST_URL)) {
            Write-Host "- live PostgreSQL provider tests: skipped because SLOPPY_POSTGRES_TEST_URL is not set."
          } else {
            Write-Host "- live PostgreSQL provider tests: enabled because SLOPPY_POSTGRES_TEST_URL is set."
          }
          Write-Host "- default SQL Server provider tests: run ODBC diagnostics through CTest."
          if ([string]::IsNullOrWhiteSpace($env:SLOPPY_SQLSERVER_TEST_CONNECTION_STRING)) {
            Write-Host "- live SQL Server provider tests: skipped because SLOPPY_SQLSERVER_TEST_CONNECTION_STRING is not set."
          } else {
            Write-Host "- live SQL Server provider tests: enabled because SLOPPY_SQLSERVER_TEST_CONNECTION_STRING is set."
          }

      - name: Test
        shell: pwsh
        run: ctest --preset windows-dev --output-on-failure

      - name: Format check
        shell: pwsh
        run: .\tools\windows\dev.ps1 format-check -Preset windows-dev

      - name: Lint including standards scanners
        shell: pwsh
        run: .\tools\windows\dev.ps1 lint -Preset windows-dev

  unix:
    name: ci-platform / ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci'))

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-clang
            runner: ubuntu-latest
            preset: linux-clang
            cc: clang
            cxx: clang++
            compiler_packages: clang
          - name: linux-gcc
            runner: ubuntu-latest
            preset: linux-gcc
            cc: gcc
            cxx: g++
            compiler_packages: gcc g++
          - name: macos
            runner: macos-latest
            preset: macos-clang
            cc: clang
            cxx: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler -> target
          cache-on-failure: true

      - name: Install Linux host dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          packages=(build-essential cmake ninja-build pkg-config curl zip unzip tar autoconf autoconf-archive automake libtool bison flex ccache ${{ matrix.compiler_packages }})
          missing=()

          for command in cmake ninja pkg-config curl zip unzip tar autoconf automake libtoolize bison flex ccache ${{ matrix.cc }} ${{ matrix.cxx }}; do
            if ! command -v "$command" >/dev/null 2>&1; then
              missing=("${packages[@]}")
              break
            fi
          done
          if ! dpkg-query -W -f='${Status}' autoconf-archive 2>/dev/null | grep -q "install ok installed"; then
            missing=("${packages[@]}")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            sudo apt-get update
            sudo apt-get install -y "${missing[@]}"
          fi

      - name: Install macOS host dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for package in cmake ninja pkg-config autoconf autoconf-archive automake libtool ccache; do
            if ! brew list --formula "$package" >/dev/null 2>&1; then
              missing+=("$package")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            brew install "${missing[@]}"
          fi
          echo "$(brew --prefix libtool)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-${{ matrix.preset }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.preset }}-ccache-

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: ${{ runner.os }}-${{ matrix.preset }}-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.preset }}-vcpkg-${{ env.VCPKG_COMMIT }}-
            ${{ runner.os }}-${{ matrix.preset }}-vcpkg-

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          set -euo pipefail
          vcpkg_root="$PWD/.sdeps/vcpkg"
          vcpkg_binary_cache="$PWD/.sdeps/vcpkg-bincache"
          mkdir -p "$vcpkg_binary_cache"
          if [ ! -d "$vcpkg_root" ]; then
            mkdir -p "$(dirname "$vcpkg_root")"
            git clone https://github.com/microsoft/vcpkg.git "$vcpkg_root"
          fi
          git -C "$vcpkg_root" fetch origin
          git -C "$vcpkg_root" checkout "$VCPKG_COMMIT"
          if [ ! -x "$vcpkg_root/vcpkg" ]; then
            "$vcpkg_root/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$vcpkg_root" >> "$GITHUB_ENV"
          echo "VCPKG_DEFAULT_BINARY_CACHE=$vcpkg_binary_cache" >> "$GITHUB_ENV"

      - name: Check tracked generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          tracked="$(git ls-files -- build compiler/target target .sdeps .sloppy vcpkg_installed artifacts '*.exe' '*.pdb' '*.zip' '*.7z' '*.tar.gz')"
          if [ -n "$tracked" ]; then
            printf 'Generated artifacts are tracked:\n%s\n' "$tracked" >&2
            exit 1
          fi

      - name: Configure
        shell: bash
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          set -euo pipefail
          ninja_path="$(command -v ninja)"
          cmake_args=(
            --preset "${{ matrix.preset }}"
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
            -DCMAKE_MAKE_PROGRAM="$ninja_path"
            -DSLOPPY_ENABLE_WERROR=ON
            -DSLOPPY_ENABLE_V8=OFF
            -DSLOPPY_ENGINE=none
          )
          if command -v ccache >/dev/null 2>&1; then
            cmake_args+=(
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            )
          fi
          cmake "${cmake_args[@]}"

      - name: Save vcpkg cache after configure
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: ${{ runner.os }}-${{ matrix.preset }}-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Build
        shell: bash
        run: cmake --build --preset "${{ matrix.preset }}"

      - name: Provider gate report
        shell: bash
        run: |
          set -euo pipefail
          echo "Provider gate report:"
          echo "- default SQLite provider tests: run in-memory through CTest."
          echo "- default PostgreSQL provider tests: run non-live diagnostics through CTest."
          if [ -z "${SLOPPY_POSTGRES_TEST_URL:-}" ]; then
            echo "- live PostgreSQL provider tests: skipped because SLOPPY_POSTGRES_TEST_URL is not set."
          else
            echo "- live PostgreSQL provider tests: enabled because SLOPPY_POSTGRES_TEST_URL is set."
          fi
          echo "- default SQL Server provider tests: run stub/unavailable diagnostics with SLOPPY_ENABLE_SQLSERVER=OFF on this platform."
          if [ -z "${SLOPPY_SQLSERVER_TEST_CONNECTION_STRING:-}" ]; then
            echo "- live SQL Server provider tests: skipped because SLOPPY_SQLSERVER_TEST_CONNECTION_STRING is not set."
          else
            echo "- live SQL Server provider tests: configured, but SQL Server ODBC execution requires an explicit SQL Server-enabled job."
          fi

      - name: Test
        shell: bash
        run: ctest --preset "${{ matrix.preset }}" --output-on-failure

      - name: POSIX standards checks
        shell: bash
        run: |
          set -euo pipefail
          tools/unix/check-platform-boundaries.sh
          tools/unix/check-c-standards.sh --self-test
          tools/unix/check-c-standards.sh

  advanced-analysis:
    name: advanced static analysis
    runs-on: ubuntu-latest
    needs: changes
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.advanced_analysis == 'true') ||
      (github.event_name == 'pull_request' && (needs.changes.outputs.analysis_relevant == 'true' || contains(github.event.pull_request.labels.*.name, 'full-ci') || contains(github.event.pull_request.labels.*.name, 'memory-analysis'))) ||
      (github.event_name == 'push' && needs.changes.outputs.analysis_relevant == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install host dependencies
        shell: bash
        run: |
          set -euo pipefail
          packages=(build-essential clang clang-tidy cmake ninja-build pkg-config curl zip unzip tar autoconf autoconf-archive automake libtool bison flex ccache)
          missing=()

          for command in clang clang++ clang-tidy cmake ninja pkg-config curl zip unzip tar autoconf automake libtoolize bison flex ccache; do
            if ! command -v "$command" >/dev/null 2>&1; then
              missing=("${packages[@]}")
              break
            fi
          done
          if ! dpkg-query -W -f='${Status}' autoconf-archive 2>/dev/null | grep -q "install ok installed"; then
            missing=("${packages[@]}")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            sudo apt-get update
            sudo apt-get install -y "${missing[@]}"
          fi

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: advanced-analysis-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            advanced-analysis-vcpkg-${{ env.VCPKG_COMMIT }}-

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          set -euo pipefail
          vcpkg_root="$PWD/.sdeps/vcpkg"
          vcpkg_binary_cache="$PWD/.sdeps/vcpkg-bincache"
          mkdir -p "$vcpkg_binary_cache"
          if [ ! -d "$vcpkg_root" ]; then
            mkdir -p "$(dirname "$vcpkg_root")"
            git clone https://github.com/microsoft/vcpkg.git "$vcpkg_root"
          fi
          git -C "$vcpkg_root" fetch origin
          git -C "$vcpkg_root" checkout "$VCPKG_COMMIT"
          if [ ! -x "$vcpkg_root/vcpkg" ]; then
            "$vcpkg_root/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$vcpkg_root" >> "$GITHUB_ENV"
          echo "VCPKG_DEFAULT_BINARY_CACHE=$vcpkg_binary_cache" >> "$GITHUB_ENV"

      - name: Configure compile database
        shell: bash
        run: |
          set -euo pipefail
          cmake \
            --preset linux-clang \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_MAKE_PROGRAM="$(command -v ninja)" \
            -DSLOPPY_ENABLE_WERROR=OFF \
            -DSLOPPY_ENABLE_V8=OFF \
            -DSLOPPY_ENGINE=none \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Save vcpkg cache after configure
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: advanced-analysis-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Run repo-wide clang-tidy analyzer profile
        shell: bash
        run: cmake --build --preset linux-clang --target sloppy_memory_analysis

  ci-full:
    name: ci-full
    runs-on: ubuntu-latest
    needs: [windows, unix, rust]
    if: always() && (github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'full-ci')))

    steps:
      - name: Require full lane success
        if: contains(join(needs.*.result, ','), 'failure') || contains(join(needs.*.result, ','), 'cancelled') || contains(join(needs.*.result, ','), 'skipped')
        run: |
          echo "Full validation did not complete successfully: ${{ join(needs.*.result, ',') }}"
          exit 1

      - name: Full lane passed
        run: echo "Full CI lane passed on the final branch state."

  optional-v8:
    name: Optional V8 validation
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' && inputs.enable_v8 == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check V8 SDK gate
        id: v8
        shell: pwsh
        run: |
          $v8Root = "${{ inputs.v8_root }}"
          if ([string]::IsNullOrWhiteSpace($v8Root)) {
            Write-Host "::notice title=Optional V8 validation skipped::No v8_root workflow input was supplied. This job did not run V8 configure/build/tests."
            "configured=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }
          if (-not (Test-Path -LiteralPath $v8Root -PathType Container)) {
            Write-Host "::notice title=Optional V8 validation skipped::The supplied v8_root does not exist on this runner: $v8Root"
            "configured=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }
          "SLOPPY_V8_ROOT=$v8Root" | Out-File -FilePath $env:GITHUB_ENV -Append
          "configured=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup Rust
        if: steps.v8.outputs.configured == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        if: steps.v8.outputs.configured == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler -> target
          cache-on-failure: true

      - name: Ensure Ninja
        if: steps.v8.outputs.configured == 'true'
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y --no-progress
          }

      - name: Restore vcpkg cache
        id: vcpkg-cache
        if: steps.v8.outputs.configured == 'true'
        uses: actions/cache/restore@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: windows-v8-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            windows-v8-vcpkg-${{ env.VCPKG_COMMIT }}-
            windows-v8-vcpkg-

      - name: Bootstrap vcpkg
        if: steps.v8.outputs.configured == 'true'
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $PWD ".sdeps/vcpkg"
          $vcpkgBinaryCache = Join-Path $PWD ".sdeps/vcpkg-bincache"
          New-Item -ItemType Directory -Force -Path $vcpkgBinaryCache | Out-Null
          if (-not (Test-Path -LiteralPath $vcpkgRoot)) {
            New-Item -ItemType Directory -Force -Path (Split-Path -Parent $vcpkgRoot) | Out-Null
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          }
          git -C $vcpkgRoot fetch origin
          git -C $vcpkgRoot checkout $env:VCPKG_COMMIT
          if (-not (Test-Path -LiteralPath (Join-Path $vcpkgRoot "vcpkg.exe"))) {
            & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat") -disableMetrics
          }
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_DEFAULT_BINARY_CACHE=$vcpkgBinaryCache" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Validate V8 SDK
        if: steps.v8.outputs.configured == 'true'
        shell: pwsh
        run: .\tools\windows\fetch-v8.ps1 -ValidateOnly -V8Root $env:SLOPPY_V8_ROOT

      - name: Configure V8 build
        if: steps.v8.outputs.configured == 'true'
        shell: pwsh
        run: .\tools\windows\dev.ps1 configure -Preset windows-relwithdebinfo -CMakeArgs "-DSLOPPY_ENABLE_V8=ON","-DSLOPPY_V8_ROOT=$env:SLOPPY_V8_ROOT","-DSLOPPY_ENABLE_WERROR=ON"

      - name: Save vcpkg cache after configure
        if: steps.v8.outputs.configured == 'true' && steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: windows-v8-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Build V8 build
        if: steps.v8.outputs.configured == 'true'
        shell: pwsh
        run: .\tools\windows\dev.ps1 build -Preset windows-relwithdebinfo

      - name: Test V8 build
        if: steps.v8.outputs.configured == 'true'
        shell: pwsh
        run: .\tools\windows\dev.ps1 test -Preset windows-relwithdebinfo
