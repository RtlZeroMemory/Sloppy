name: npm-publish

on:
  workflow_dispatch:
    inputs:
      release_artifacts_run_id:
        description: "GitHub Actions run ID from release-artifacts that uploaded npm tarballs."
        required: true
        type: string
      publish:
        description: "Publish to npm. Leave false for a dry-run validation."
        required: true
        default: false
        type: boolean
      confirm:
        description: "Type publish-alpha when publish=true."
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: npm publish / alpha gated
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate publish gate
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.publish }}" == "true" && "${{ inputs.confirm }}" != "publish-alpha" ]]; then
            echo "Publishing requires confirm=publish-alpha." >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.17.0"

      - name: Setup npm
        shell: bash
        run: |
          set -euo pipefail
          # npm 11 keeps Trusted Publishing/OIDC provenance behavior consistent on Node 22.
          npm install -g npm@11.5.1
          node --version
          npm --version

      - name: Download Windows npm tarballs
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.release_artifacts_run_id }}
          name: sloppy-windows-x64-dry-run
          path: artifacts/npm-publish/windows

      - name: Download Linux npm tarballs
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.release_artifacts_run_id }}
          name: sloppy-linux-x64-dry-run
          path: artifacts/npm-publish/linux

      - name: Download macOS arm64 npm tarballs
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.release_artifacts_run_id }}
          name: sloppy-macos-arm64-dry-run
          path: artifacts/npm-publish/macos-arm64

      - name: Download macOS x64 npm tarballs
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.release_artifacts_run_id }}
          name: sloppy-macos-x64-dry-run
          path: artifacts/npm-publish/macos-x64

      - name: Locate npm tarballs
        id: tarballs
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t root_candidates < <(find artifacts/npm-publish/linux -type f -name 'slopware-sloppy-[0-9]*.tgz' | sort)
          mapfile -t linux_candidates < <(find artifacts/npm-publish/linux -type f -name 'slopware-sloppy-linux-x64-*.tgz' | sort)
          mapfile -t windows_candidates < <(find artifacts/npm-publish/windows -type f -name 'slopware-sloppy-win32-x64-*.tgz' | sort)
          mapfile -t macos_arm64_candidates < <(find artifacts/npm-publish/macos-arm64 -type f -name 'slopware-sloppy-darwin-arm64-*.tgz' | sort)
          mapfile -t macos_x64_candidates < <(find artifacts/npm-publish/macos-x64 -type f -name 'slopware-sloppy-darwin-x64-*.tgz' | sort)
          if [[ "${#root_candidates[@]}" -ne 1 || "${#linux_candidates[@]}" -ne 1 || "${#windows_candidates[@]}" -ne 1 || "${#macos_arm64_candidates[@]}" -ne 1 || "${#macos_x64_candidates[@]}" -ne 1 ]]; then
            echo "Expected one root, one Linux, one Windows, one macOS arm64, and one macOS x64 npm tarball from release-artifacts." >&2
            find artifacts/npm-publish -name '*.tgz' -print >&2
            exit 1
          fi
          {
            echo "root=${root_candidates[0]}"
            echo "linux=${linux_candidates[0]}"
            echo "windows=${windows_candidates[0]}"
            echo "macos_arm64=${macos_arm64_candidates[0]}"
            echo "macos_x64=${macos_x64_candidates[0]}"
          } >> "$GITHUB_OUTPUT"

      - name: Local npm install smoke
        shell: bash
        run: |
          set -euo pipefail
          temp_root="$(mktemp -d)"
          trap 'rm -rf "$temp_root"' EXIT
          npm install --prefix "$temp_root/install" \
            "${{ steps.tarballs.outputs.root }}" \
            "${{ steps.tarballs.outputs.linux }}"
          launcher="$temp_root/install/node_modules/@slopware/sloppy/bin/sloppy.js"
          node "$launcher" --version
          node "$launcher" doctor
          mkdir -p "$temp_root/work"
          for template in minimal-api full-api dogfood; do
            app="${template}-app"
            (cd "$temp_root/work" && node "$launcher" create "$app" --template "$template")
            test -f "$temp_root/work/$app/.gitignore"
            test ! -e "$temp_root/work/$app/gitignore"
            (cd "$temp_root/work/$app" && node "$launcher" build)
            (cd "$temp_root/work/$app" && node "$launcher" routes --artifacts .sloppy --format json >/tmp/${template}-routes.json)
            (cd "$temp_root/work/$app" && node "$launcher" doctor --artifacts .sloppy)
            set +e
            run_output="$(cd "$temp_root/work/$app" && timeout 120s node "$launcher" run --once GET /health 2>&1)"
            run_status=$?
            set -e
            if [[ "$run_status" -eq 124 ]]; then
              echo "Local npm smoke timed out after 120 seconds for $template." >&2
              echo "$run_output" >&2
              exit 1
            fi
            if [[ "$run_status" -ne 0 ]]; then
              echo "Local npm smoke failed for $template with exit code $run_status." >&2
              echo "$run_output" >&2
              exit 1
            fi
            if [[ "$run_output" != *"ok"* ]]; then
              echo "Local npm smoke did not return /health ok for $template." >&2
              echo "$run_output" >&2
              exit 1
            fi
            mkdir -p "$temp_root/work/$app/.sloppy/package"
            printf stale > "$temp_root/work/$app/.sloppy/package/stale.txt"
            (cd "$temp_root/work/$app" && node "$launcher" package --format json >/tmp/${template}-package.json)
            test ! -e "$temp_root/work/$app/.sloppy/package/stale.txt"
          done

      - name: npm publish dry-run
        if: ${{ inputs.publish != true }}
        shell: bash
        run: |
          set -euo pipefail
          npm publish "${{ steps.tarballs.outputs.windows }}" --registry https://registry.npmjs.org/ --access public --tag alpha --dry-run
          npm publish "${{ steps.tarballs.outputs.linux }}" --registry https://registry.npmjs.org/ --access public --tag alpha --dry-run
          npm publish "${{ steps.tarballs.outputs.macos_arm64 }}" --registry https://registry.npmjs.org/ --access public --tag alpha --dry-run
          npm publish "${{ steps.tarballs.outputs.macos_x64 }}" --registry https://registry.npmjs.org/ --access public --tag alpha --dry-run
          npm publish "${{ steps.tarballs.outputs.root }}" --registry https://registry.npmjs.org/ --access public --tag alpha --dry-run
          echo "Dry-run only. Set publish=true and confirm=publish-alpha to publish."

      - name: Publish platform packages
        if: ${{ inputs.publish == true }}
        shell: bash
        run: |
          set -euo pipefail
          publish_one() {
            local tarball="$1"
            if ! npm publish "$tarball" --registry https://registry.npmjs.org/ --access public --tag alpha --provenance; then
              echo "npm publish failed. Confirm npm Trusted Publishing is configured for this GitHub workflow and package on npmjs.com." >&2
              echo "Do not commit .npmrc auth files or print npm tokens." >&2
              exit 1
            fi
          }
          publish_one "${{ steps.tarballs.outputs.windows }}"
          publish_one "${{ steps.tarballs.outputs.linux }}"
          publish_one "${{ steps.tarballs.outputs.macos_arm64 }}"
          publish_one "${{ steps.tarballs.outputs.macos_x64 }}"

      - name: Publish root launcher package
        if: ${{ inputs.publish == true }}
        shell: bash
        run: |
          set -euo pipefail
          if ! npm publish "${{ steps.tarballs.outputs.root }}" --registry https://registry.npmjs.org/ --access public --tag alpha --provenance; then
            echo "npm root package publish failed. Platform packages publish first; reruns must account for already-published versions." >&2
            echo "Confirm npm Trusted Publishing is configured before retrying." >&2
            exit 1
          fi
