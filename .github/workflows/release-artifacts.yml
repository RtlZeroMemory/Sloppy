name: release-artifacts

on:
  workflow_dispatch:
    inputs:
      include_windows:
        description: "Build the Windows x64 dry-run package."
        required: true
        default: true
        type: boolean
      include_linux:
        description: "Build the Linux x64 dry-run package."
        required: true
        default: true
        type: boolean
      include_macos_arm64:
        description: "Build the macOS arm64 dry-run package."
        required: true
        default: true
        type: boolean
      include_macos_x64:
        description: "Build the macOS x64 dry-run package."
        required: true
        default: true
        type: boolean
      run_package_smoke:
        description: "Run outside-checkout package smoke after packaging."
        required: true
        default: true
        type: boolean
      dry_run:
        description: "Keep this workflow in dry-run mode. Publishing is handled separately."
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: release-artifacts-${{ github.ref }}
  cancel-in-progress: false

env:
  VCPKG_COMMIT: 031f4afe03be385aee354f15be6e6b1fe57497c7
  VCPKG_CACHE_VERSION: v3
  VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/RtlZeroMemory/index.json,readwrite"
  NUGET_FEED_URL: "https://nuget.pkg.github.com/RtlZeroMemory/index.json"
  NUGET_USERNAME: "RtlZeroMemory"
  NUGET_PAT: ${{ secrets.VCPKG_PAT }}
  CMAKE_BUILD_PARALLEL_LEVEL: 4

jobs:
  release-static:
    name: release dry-run / static policy
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release policy
        shell: pwsh
        run: |
          if ("${{ inputs.dry_run }}" -ne "true") {
            throw "release-artifacts only supports dry_run=true. Publishing is handled separately."
          }
          .\tools\windows\check-release-artifacts.ps1 -SelfTest
          .\tools\windows\check-release-artifacts.ps1

      - name: Upload release policy files
        uses: actions/upload-artifact@v4
        with:
          name: release-policy-files
          if-no-files-found: error
          path: |
            RELEASE_NOTES.md
            CHANGELOG.md
            docs/release/**

  package-windows:
    name: release dry-run / windows-x64
    runs-on: windows-latest
    if: inputs.include_windows
    needs: release-static

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.17.0"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler -> target
          cache-on-failure: true

      - name: Ensure Ninja
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y --no-progress
          }

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: windows-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            windows-vcpkg-${{ env.VCPKG_COMMIT }}-
            windows-vcpkg-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $PWD ".sdeps/vcpkg"
          $vcpkgBinaryCache = Join-Path $PWD ".sdeps/vcpkg-bincache"
          New-Item -ItemType Directory -Force -Path $vcpkgBinaryCache | Out-Null
          if (-not (Test-Path -LiteralPath $vcpkgRoot)) {
            New-Item -ItemType Directory -Force -Path (Split-Path -Parent $vcpkgRoot) | Out-Null
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          }
          git -C $vcpkgRoot fetch origin
          git -C $vcpkgRoot checkout $env:VCPKG_COMMIT
          if (-not (Test-Path -LiteralPath (Join-Path $vcpkgRoot "vcpkg.exe"))) {
            & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat") -disableMetrics
          }
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_DEFAULT_BINARY_CACHE=$vcpkgBinaryCache" | Out-File -FilePath $env:GITHUB_ENV -Append
          if (-not [string]::IsNullOrWhiteSpace($env:NUGET_PAT)) {
            $vcpkgExe = Join-Path $vcpkgRoot "vcpkg.exe"
            $nugetExe = & $vcpkgExe fetch nuget | Select-Object -Last 1
            & $nugetExe sources add -Source $env:NUGET_FEED_URL -StorePasswordInClearText -Name GitHubPackages -UserName $env:NUGET_USERNAME -Password $env:NUGET_PAT 2>&1 | Out-Null
            & $nugetExe setapikey $env:NUGET_PAT -Source $env:NUGET_FEED_URL 2>&1 | Out-Null
          } else {
            Write-Host "::notice::NUGET_PAT secret not set; using local file binary cache only"
            "VCPKG_BINARY_SOURCES=default,readwrite" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Release artifact dry-run
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if ("${{ inputs.run_package_smoke }}" -ne "true") {
            .\tools\windows\release-dry-run.ps1 -Preset windows-relwithdebinfo -RequireV8Runtime -SkipSmoke
          } else {
            .\tools\windows\release-dry-run.ps1 -Preset windows-relwithdebinfo -RequireV8Runtime
          }

      - name: npm launcher dry-run from Windows archive
        shell: pwsh
        run: .\tools\windows\npm-dry-run.ps1 -PackagePath artifacts\packages\sloppy-windows-x64.zip -RequireV8Runtime

      - name: Save vcpkg cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: windows-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Upload Windows dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sloppy-windows-x64-dry-run
          if-no-files-found: error
          path: |
            artifacts/packages/sloppy-*.zip
            artifacts/packages/SHA256SUMS.txt
            artifacts/release-dry-run/**
            artifacts/npm/summary.json
            artifacts/npm/tarballs/*.tgz

  package-linux:
    name: release dry-run / linux-x64
    needs: release-static
    if: inputs.include_linux
    # Build the published glibc package on a conservative ABI floor. Building
    # directly on ubuntu-latest produced binaries requiring GLIBC_2.38.
    runs-on: ubuntu-latest
    container:
      image: node:22-bullseye

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler -> target
          cache-on-failure: true

      - name: Install Linux host dependencies
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl file git python3 cmake ninja-build pkg-config zip unzip tar xz-utils \
            autoconf autoconf-archive automake libtool bison flex ccache build-essential \
            clang lld libglib2.0-dev mono-complete gnupg
          mkdir -p /etc/apt/keyrings
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg -o /etc/apt/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" > /etc/apt/sources.list.d/github-cli.list
          apt-get update
          apt-get install -y --no-install-recommends gh

      - name: Verify Linux baseline toolchain
        shell: bash
        run: |
          node --version
          npm --version
          clang --version
          ldd --version | sed -n '1p'

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: Linux-linux-clang-release-ccache-${{ github.sha }}
          restore-keys: |
            Linux-linux-clang-release-ccache-
            Linux-linux-clang-ccache-

      - name: Restore Linux V8 SDK cache
        id: linux-v8-sdk-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .sdeps/v8/linux-x64
            artifacts/v8-sdk
          key: linux-v8-sdk-${{ hashFiles('tools/unix/build-v8.sh', 'tools/unix/resolve-v8-sdk.sh', 'tools/deps/sloppy-deps.json') }}
          restore-keys: |
            linux-v8-sdk-

      - name: Validate Linux V8 SDK cache
        id: linux-v8-sdk
        shell: bash
        run: |
          set -euo pipefail
          if tools/unix/resolve-v8-sdk.sh --mode AUTO --quiet > /tmp/sloppy-v8-root && [ -s /tmp/sloppy-v8-root ]; then
            echo "cached=true" >> "$GITHUB_OUTPUT"
            echo "Using cached Linux V8 SDK: $(cat /tmp/sloppy-v8-root)"
          else
            rm -rf .sdeps/v8/linux-x64 artifacts/v8-sdk
            echo "cached=false" >> "$GITHUB_OUTPUT"
            echo "No compatible cached Linux V8 SDK found."
          fi

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: Linux-linux-clang-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            Linux-linux-clang-vcpkg-${{ env.VCPKG_COMMIT }}-
            Linux-linux-clang-vcpkg-

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          set -euo pipefail
          vcpkg_root="$PWD/.sdeps/vcpkg"
          vcpkg_binary_cache="$PWD/.sdeps/vcpkg-bincache"
          mkdir -p "$vcpkg_binary_cache"
          if [ ! -d "$vcpkg_root" ]; then
            mkdir -p "$(dirname "$vcpkg_root")"
            git clone https://github.com/microsoft/vcpkg.git "$vcpkg_root"
          fi
          git -C "$vcpkg_root" fetch origin
          git -C "$vcpkg_root" checkout "$VCPKG_COMMIT"
          if [ ! -x "$vcpkg_root/vcpkg" ]; then
            "$vcpkg_root/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$vcpkg_root" >> "$GITHUB_ENV"
          echo "VCPKG_DEFAULT_BINARY_CACHE=$vcpkg_binary_cache" >> "$GITHUB_ENV"
          if [ -n "${NUGET_PAT:-}" ] && command -v mono >/dev/null 2>&1; then
            nuget_path="$("$vcpkg_root/vcpkg" fetch nuget | tail -n 1)"
            mono "$nuget_path" sources add -Source "$NUGET_FEED_URL" -StorePasswordInClearText -Name GitHubPackages -UserName "$NUGET_USERNAME" -Password "$NUGET_PAT" >/dev/null 2>&1 || true
            mono "$nuget_path" setapikey "$NUGET_PAT" -Source "$NUGET_FEED_URL" >/dev/null 2>&1 || true
          else
            if [ -z "${NUGET_PAT:-}" ]; then
              echo "::notice::NUGET_PAT secret not set; using local file binary cache only"
            else
              echo "::warning::mono not available; using local file binary cache only"
            fi
            echo "VCPKG_BINARY_SOURCES=default,readwrite" >> "$GITHUB_ENV"
          fi

      - name: Restore Linux V8 SDK asset
        if: steps.linux-v8-sdk.outputs.cached != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          download_dir="$PWD/artifacts/v8-sdk-cache/linux-x64"
          mkdir -p "$download_dir" "$PWD/.sdeps/v8"
          gh release download sloppy-v8-sdk-cache \
            --repo RtlZeroMemory/Slop \
            --pattern 'sloppy-v8-sdk-linux-x64-*.tar.gz' \
            --pattern 'sloppy-v8-sdk-linux-x64-*.tar.gz.sha256' \
            --dir "$download_dir" \
            --clobber
          archives=()
          while IFS= read -r item; do archives+=("$item"); done < <(find "$download_dir" -maxdepth 1 -type f -name '*.tar.gz' | sort)
          checksums=()
          while IFS= read -r item; do checksums+=("$item"); done < <(find "$download_dir" -maxdepth 1 -type f -name '*.tar.gz.sha256' | sort)
          if [ "${#archives[@]}" -ne 1 ] || [ "${#checksums[@]}" -ne 1 ]; then
            echo "Expected exactly one Linux x64 V8 SDK archive and checksum in $download_dir." >&2
            find "$download_dir" -maxdepth 1 -type f -print >&2
            exit 1
          fi
          expected_hash="$(awk '{print $1}' "${checksums[0]}")"
          actual_hash="$(sha256sum "${archives[0]}" | awk '{print $1}')"
          if [ "$actual_hash" != "$expected_hash" ]; then
            echo "Linux x64 V8 SDK checksum mismatch." >&2
            echo "expected: $expected_hash" >&2
            echo "actual:   $actual_hash" >&2
            exit 1
          fi
          rm -rf "$PWD/.sdeps/v8/linux-x64" "$PWD/.sdeps/v8/v8"
          tar -xzf "${archives[0]}" -C "$PWD/.sdeps/v8"
          if [ -d "$PWD/.sdeps/v8/v8" ]; then
            mv "$PWD/.sdeps/v8/v8" "$PWD/.sdeps/v8/linux-x64"
          elif [ ! -d "$PWD/.sdeps/v8/linux-x64" ]; then
            echo "Linux x64 V8 SDK archive did not contain v8/ or linux-x64/." >&2
            find "$PWD/.sdeps/v8" -maxdepth 2 -type d -print >&2
            exit 1
          fi
          test -f "$PWD/.sdeps/v8/linux-x64/share/sloppy-v8-sdk.json"

      - name: Save Linux V8 SDK cache
        if: steps.linux-v8-sdk.outputs.cached != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .sdeps/v8/linux-x64
            artifacts/v8-sdk
          key: ${{ steps.linux-v8-sdk-cache.outputs.cache-primary-key }}

      - name: Release artifact dry-run
        shell: bash
        env:
          CC: clang
          CXX: clang++
        run: |
          set -euo pipefail
          args=(--preset linux-clang --require-v8-runtime)
          if [ "${{ inputs.run_package_smoke }}" != "true" ]; then
            args+=(--skip-smoke)
          fi
          tools/unix/release-dry-run.sh "${args[@]}"

      - name: npm launcher dry-run from Linux archive
        shell: bash
        run: tools/unix/npm-dry-run.sh --package-path artifacts/packages/sloppy-linux-x64.tar.gz --require-v8-runtime

      - name: Save vcpkg cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: Linux-linux-clang-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Upload Linux dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sloppy-linux-x64-dry-run
          if-no-files-found: error
          path: |
            artifacts/packages/sloppy-*.tar.gz
            artifacts/packages/SHA256SUMS.txt
            artifacts/release-dry-run/**
            artifacts/npm/summary.json
            artifacts/npm/tarballs/*.tgz

  package-macos-arm64:
    name: release dry-run / macos-arm64
    needs: release-static
    if: inputs.include_macos_arm64
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.17.0"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler -> target
          cache-on-failure: true

      - name: Install macOS host dependencies
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for package in cmake ninja pkg-config autoconf autoconf-archive automake libtool ccache; do
            if ! brew list --formula "$package" >/dev/null 2>&1; then
              missing+=("$package")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            brew install "${missing[@]}"
          fi
          echo "$(brew --prefix libtool)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: macOS-macos-clang-arm64-release-ccache-${{ github.sha }}
          restore-keys: |
            macOS-macos-clang-arm64-release-ccache-
            macOS-macos-clang-ccache-

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: macOS-macos-clang-arm64-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            macOS-macos-clang-arm64-vcpkg-${{ env.VCPKG_COMMIT }}-
            macOS-macos-clang-vcpkg-

      - name: Cache mono for vcpkg NuGet (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1.4.3
        with:
          packages: mono-complete
          version: vcpkg-nuget-1

      - name: Install mono for vcpkg NuGet (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if ! brew list --formula mono >/dev/null 2>&1; then
            brew install mono
          fi

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          set -euo pipefail
          vcpkg_root="$PWD/.sdeps/vcpkg"
          vcpkg_binary_cache="$PWD/.sdeps/vcpkg-bincache"
          mkdir -p "$vcpkg_binary_cache"
          if [ ! -d "$vcpkg_root" ]; then
            mkdir -p "$(dirname "$vcpkg_root")"
            git clone https://github.com/microsoft/vcpkg.git "$vcpkg_root"
          fi
          git -C "$vcpkg_root" fetch origin
          git -C "$vcpkg_root" checkout "$VCPKG_COMMIT"
          if [ ! -x "$vcpkg_root/vcpkg" ]; then
            "$vcpkg_root/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$vcpkg_root" >> "$GITHUB_ENV"
          echo "VCPKG_DEFAULT_BINARY_CACHE=$vcpkg_binary_cache" >> "$GITHUB_ENV"
          if [ -n "${NUGET_PAT:-}" ] && command -v mono >/dev/null 2>&1; then
            nuget_path="$("$vcpkg_root/vcpkg" fetch nuget | tail -n 1)"
            mono "$nuget_path" sources add -Source "$NUGET_FEED_URL" -StorePasswordInClearText -Name GitHubPackages -UserName "$NUGET_USERNAME" -Password "$NUGET_PAT" >/dev/null 2>&1 || true
            mono "$nuget_path" setapikey "$NUGET_PAT" -Source "$NUGET_FEED_URL" >/dev/null 2>&1 || true
          else
            if [ -z "${NUGET_PAT:-}" ]; then
              echo "::notice::NUGET_PAT secret not set; using local file binary cache only"
            else
              echo "::warning::mono not available; using local file binary cache only"
            fi
            echo "VCPKG_BINARY_SOURCES=default,readwrite" >> "$GITHUB_ENV"
          fi

      - name: Restore macOS arm64 V8 SDK asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          download_dir="$PWD/artifacts/v8-sdk-cache/macos-arm64"
          mkdir -p "$download_dir" "$PWD/.sdeps/v8"
          gh release download sloppy-v8-sdk-cache \
            --repo RtlZeroMemory/Slop \
            --pattern 'sloppy-v8-sdk-darwin-arm64-*.tar.gz' \
            --pattern 'sloppy-v8-sdk-darwin-arm64-*.tar.gz.sha256' \
            --dir "$download_dir" \
            --clobber
          archives=()
          while IFS= read -r item; do archives+=("$item"); done < <(find "$download_dir" -maxdepth 1 -type f -name '*.tar.gz' | sort)
          checksums=()
          while IFS= read -r item; do checksums+=("$item"); done < <(find "$download_dir" -maxdepth 1 -type f -name '*.tar.gz.sha256' | sort)
          if [ "${#archives[@]}" -ne 1 ] || [ "${#checksums[@]}" -ne 1 ]; then
            echo "Expected exactly one macOS arm64 V8 SDK archive and checksum in $download_dir." >&2
            find "$download_dir" -maxdepth 1 -type f -print >&2
            exit 1
          fi
          archive="${archives[0]}"
          expected_hash="$(awk '{print $1}' "${checksums[0]}")"
          if command -v sha256sum >/dev/null 2>&1; then
            actual_hash="$(sha256sum "$archive" | awk '{print $1}')"
          else
            actual_hash="$(shasum -a 256 "$archive" | awk '{print $1}')"
          fi
          if [ "$actual_hash" != "$expected_hash" ]; then
            echo "macOS arm64 V8 SDK checksum mismatch." >&2
            echo "expected: $expected_hash" >&2
            echo "actual:   $actual_hash" >&2
            exit 1
          fi
          rm -rf "$PWD/.sdeps/v8/macos-arm64" "$PWD/.sdeps/v8/v8"
          tar -xzf "$archive" -C "$PWD/.sdeps/v8"
          if [ -d "$PWD/.sdeps/v8/v8" ]; then
            rm -rf "$PWD/.sdeps/v8/macos-arm64"
            mv "$PWD/.sdeps/v8/v8" "$PWD/.sdeps/v8/macos-arm64"
          elif [ ! -d "$PWD/.sdeps/v8/macos-arm64" ]; then
            echo "macOS arm64 V8 SDK archive did not contain v8/ or macos-arm64/." >&2
            find "$PWD/.sdeps/v8" -maxdepth 2 -type d -print >&2
            exit 1
          fi
          test -f "$PWD/.sdeps/v8/macos-arm64/share/sloppy-v8-sdk.json"
          echo "SLOPPY_V8_ROOT=$PWD/.sdeps/v8/macos-arm64" >> "$GITHUB_ENV"

      - name: Release artifact dry-run
        shell: bash
        env:
          CC: clang
          CXX: clang++
        run: |
          set -euo pipefail
          args=(--preset macos-clang --require-v8-runtime)
          if [ "${{ inputs.run_package_smoke }}" != "true" ]; then
            args+=(--skip-smoke)
          fi
          tools/unix/release-dry-run.sh "${args[@]}"

      - name: npm launcher dry-run from macOS arm64 archive
        shell: bash
        run: tools/unix/npm-dry-run.sh --package-path artifacts/packages/sloppy-macos-arm64.tar.gz --require-v8-runtime

      - name: Save vcpkg cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: macOS-macos-clang-arm64-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Upload macOS arm64 dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sloppy-macos-arm64-dry-run
          if-no-files-found: error
          path: |
            artifacts/packages/sloppy-*.tar.gz
            artifacts/packages/SHA256SUMS.txt
            artifacts/release-dry-run/**
            artifacts/npm/summary.json
            artifacts/npm/tarballs/*.tgz

  package-macos-x64:
    name: release dry-run / macos-x64
    needs: release-static
    if: inputs.include_macos_x64
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.17.0"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler -> target
          cache-on-failure: true

      - name: Install macOS host dependencies
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for package in cmake ninja pkg-config autoconf autoconf-archive automake libtool ccache; do
            if ! brew list --formula "$package" >/dev/null 2>&1; then
              missing+=("$package")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            brew install "${missing[@]}"
          fi
          echo "$(brew --prefix libtool)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: macOS-macos-clang-x64-release-ccache-${{ github.sha }}
          restore-keys: |
            macOS-macos-clang-x64-release-ccache-
            macOS-macos-clang-ccache-

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: macOS-macos-clang-x64-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            macOS-macos-clang-x64-vcpkg-${{ env.VCPKG_COMMIT }}-
            macOS-macos-clang-vcpkg-

      - name: Cache mono for vcpkg NuGet (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1.4.3
        with:
          packages: mono-complete
          version: vcpkg-nuget-1

      - name: Install mono for vcpkg NuGet (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if ! brew list --formula mono >/dev/null 2>&1; then
            brew install mono
          fi

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          set -euo pipefail
          vcpkg_root="$PWD/.sdeps/vcpkg"
          vcpkg_binary_cache="$PWD/.sdeps/vcpkg-bincache"
          mkdir -p "$vcpkg_binary_cache"
          if [ ! -d "$vcpkg_root" ]; then
            mkdir -p "$(dirname "$vcpkg_root")"
            git clone https://github.com/microsoft/vcpkg.git "$vcpkg_root"
          fi
          git -C "$vcpkg_root" fetch origin
          git -C "$vcpkg_root" checkout "$VCPKG_COMMIT"
          if [ ! -x "$vcpkg_root/vcpkg" ]; then
            "$vcpkg_root/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$vcpkg_root" >> "$GITHUB_ENV"
          echo "VCPKG_DEFAULT_BINARY_CACHE=$vcpkg_binary_cache" >> "$GITHUB_ENV"
          if [ -n "${NUGET_PAT:-}" ] && command -v mono >/dev/null 2>&1; then
            nuget_path="$("$vcpkg_root/vcpkg" fetch nuget | tail -n 1)"
            mono "$nuget_path" sources add -Source "$NUGET_FEED_URL" -StorePasswordInClearText -Name GitHubPackages -UserName "$NUGET_USERNAME" -Password "$NUGET_PAT" >/dev/null 2>&1 || true
            mono "$nuget_path" setapikey "$NUGET_PAT" -Source "$NUGET_FEED_URL" >/dev/null 2>&1 || true
          else
            if [ -z "${NUGET_PAT:-}" ]; then
              echo "::notice::NUGET_PAT secret not set; using local file binary cache only"
            else
              echo "::warning::mono not available; using local file binary cache only"
            fi
            echo "VCPKG_BINARY_SOURCES=default,readwrite" >> "$GITHUB_ENV"
          fi

      - name: Restore macOS x64 V8 SDK asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          download_dir="$PWD/artifacts/v8-sdk-cache/macos-x64"
          mkdir -p "$download_dir" "$PWD/.sdeps/v8"
          gh release download sloppy-v8-sdk-cache \
            --repo RtlZeroMemory/Slop \
            --pattern 'sloppy-v8-sdk-darwin-x64-*.tar.gz' \
            --pattern 'sloppy-v8-sdk-darwin-x64-*.tar.gz.sha256' \
            --dir "$download_dir" \
            --clobber
          archives=()
          while IFS= read -r item; do archives+=("$item"); done < <(find "$download_dir" -maxdepth 1 -type f -name '*.tar.gz' | sort)
          checksums=()
          while IFS= read -r item; do checksums+=("$item"); done < <(find "$download_dir" -maxdepth 1 -type f -name '*.tar.gz.sha256' | sort)
          if [ "${#archives[@]}" -ne 1 ] || [ "${#checksums[@]}" -ne 1 ]; then
            echo "Expected exactly one macOS x64 V8 SDK archive and checksum in $download_dir." >&2
            find "$download_dir" -maxdepth 1 -type f -print >&2
            exit 1
          fi
          archive="${archives[0]}"
          expected_hash="$(awk '{print $1}' "${checksums[0]}")"
          if command -v sha256sum >/dev/null 2>&1; then
            actual_hash="$(sha256sum "$archive" | awk '{print $1}')"
          else
            actual_hash="$(shasum -a 256 "$archive" | awk '{print $1}')"
          fi
          if [ "$actual_hash" != "$expected_hash" ]; then
            echo "macOS x64 V8 SDK checksum mismatch." >&2
            echo "expected: $expected_hash" >&2
            echo "actual:   $actual_hash" >&2
            exit 1
          fi
          rm -rf "$PWD/.sdeps/v8/macos-x64" "$PWD/.sdeps/v8/v8"
          tar -xzf "$archive" -C "$PWD/.sdeps/v8"
          if [ -d "$PWD/.sdeps/v8/v8" ]; then
            rm -rf "$PWD/.sdeps/v8/macos-x64"
            mv "$PWD/.sdeps/v8/v8" "$PWD/.sdeps/v8/macos-x64"
          elif [ ! -d "$PWD/.sdeps/v8/macos-x64" ]; then
            echo "macOS x64 V8 SDK archive did not contain v8/ or macos-x64/." >&2
            find "$PWD/.sdeps/v8" -maxdepth 2 -type d -print >&2
            exit 1
          fi
          test -f "$PWD/.sdeps/v8/macos-x64/share/sloppy-v8-sdk.json"
          echo "SLOPPY_V8_ROOT=$PWD/.sdeps/v8/macos-x64" >> "$GITHUB_ENV"

      - name: Release artifact dry-run
        shell: bash
        env:
          CC: clang
          CXX: clang++
        run: |
          set -euo pipefail
          args=(--preset macos-clang --require-v8-runtime)
          if [ "${{ inputs.run_package_smoke }}" != "true" ]; then
            args+=(--skip-smoke)
          fi
          tools/unix/release-dry-run.sh "${args[@]}"

      - name: npm launcher dry-run from macOS x64 archive
        shell: bash
        run: tools/unix/npm-dry-run.sh --package-path artifacts/packages/sloppy-macos-x64.tar.gz --require-v8-runtime

      - name: Save vcpkg cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: |
            .sdeps/vcpkg
            .sdeps/vcpkg-bincache
            vcpkg_installed
          key: macOS-macos-clang-x64-vcpkg-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Upload macOS x64 dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sloppy-macos-x64-dry-run
          if-no-files-found: error
          path: |
            artifacts/packages/sloppy-*.tar.gz
            artifacts/packages/SHA256SUMS.txt
            artifacts/release-dry-run/**
            artifacts/npm/summary.json
            artifacts/npm/tarballs/*.tgz
